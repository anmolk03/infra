trigger:
- main

pool:
  name: 'self-hosted' # Replace with your self-hosted pool name if different

variables:
  # 1. Update these to match your Portal settings
  serviceConnection: 'azure-svc-conn'
  resourceGroup: 'playgroundcleansub0'
  storageAccount: 'tfstatesa123'
  container: 'tfstate'
  tfstateKey: 'acr.terraform.tfstate'

steps:
# Ensure Terraform is available on the agent
- task: TerraformInstaller@1
  inputs:
    terraformVersion: 'latest'

# 1. Initialize (Connects to the Storage Account Backend)
- task: TerraformTaskV4@4
  displayName: 'Terraform Init'
  inputs:
    provider: 'azurerm'
    command: 'init'
    backendServiceArm: $(serviceConnection)
    backendAzureRmResourceGroupName: $(resourceGroup)
    backendAzureRmStorageAccountName: $(storageAccount)
    backendAzureRmContainerName: $(container)
    backendAzureRmKey: $(tfstateKey)

# 2. Plan (Dry run to see what will be created)
- task: TerraformTaskV4@4
  displayName: 'Terraform Plan'
  inputs:
    provider: 'azurerm'
    command: 'plan'
    environmentServiceNameAzureRM: $(serviceConnection)

# 3. Apply (Actually creates the ACR)
- task: TerraformTaskV4@4
  displayName: 'Terraform Apply'
  inputs:
    provider: 'azurerm'
    command: 'apply'
    environmentServiceNameAzureRM: $(serviceConnection)
    commandOptions: '-auto-approve'
